<script>
// ─── STATE MANAGEMENT ──────────────────────────────────────────────────────────
let players = [];
let gameData = { matches: [], qualified: [], eliminated: [], goldenBootScorers: [], goldenBoot: null, goalOfTournament: null, youngPlayer: null };
let scoredPlayers = [];
let playerCount = 0;
let activeTab = 'leaderboard';

// ─── INTERACTIVE TABS ─────────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach((el,i) => {
    const tabs = ['leaderboard','upcoming','h2h','boot'];
    el.classList.toggle('active', tabs[i] === tab);
  });
  document.querySelectorAll('.tab-panel').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
}

// ─── CONFIGURATION LOGIC ──────────────────────────────────────────────────────
function addPlayerInput(name='', teams=['','','','','','']) {
  playerCount++;
  const id = playerCount;
  
  // List of all 48 qualified World Cup 2026 teams
  const worldCupTeams = [
    "Algeria", "Argentina", "Australia", "Austria", "Belgium", "Bosnia and Herzegovina", 
    "Brazil", "Cameroon", "Canada", "Cape Verde", "Chile", "Colombia", "Costa Rica", 
    "Croatia", "Czechia", "Denmark", "DR Congo", "Ecuador", "Egypt", "England", 
    "France", "Germany", "Ghana", "Iran", "Iraq", "Ivory Coast", "Japan", "Jordan", 
    "Mexico", "Morocco", "Netherlands", "New Zealand", "Nigeria", "Panama", 
    "Paraguay", "Peru", "Poland", "Portugal", "Qatar", "Saudi Arabia", "Scotland", 
    "Senegal", "Serbia", "South Africa", "South Korea", "Spain", "Sweden", 
    "Switzerland", "Tunisia", "Turkey", "Ukraine", "Uruguay", "USA", "Uzbekistan", 
    "Wales", "Zambia"
  ];

  // Generate dropdown options
  const optionsHtml = (selectedTeam) => {
    return `<option value="">-- Select a Team --</option>` + 
      worldCupTeams.map(team => {
        const isSelected = norm(team) === norm(selectedTeam) ? 'selected' : '';
        return `<option value="${team}" ${isSelected}>${team}</option>`;
      }).join('');
  };

  const div = document.createElement('div');
  div.id = `prow-${id}`;
  div.innerHTML = `
    <div class="player-row">
      <label>Player ${id}<br><small style="color:var(--muted);font-size:0.68rem">+ 6 teams</small></label>
      <div>
        <input type="text" placeholder="Player name" value="${name}" id="pname-${id}" style="margin-bottom:7px">
        <div class="team-inputs">
          ${teams.map((t, i) => `
            <select id="pt${i+1}-${id}" style="background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 8px 12px; font-family: 'DM Sans', sans-serif; font-size: 0.84rem; width: 100%; outline: none; margin-bottom: 3px;">
              ${optionsHtml(t)}
            </select>
          `).join('')}
        </div>
      </div>
      ${id > 1 ? `<button class="remove-btn" onclick="removePlayer(${id})" title="Remove">✕</button>` : '<div></div>'}
    </div>`;
    
  document.getElementById('playerInputs').appendChild(div);
}
function removePlayer(id) { document.getElementById(`prow-${id}`)?.remove(); }

function startDashboard() {
  players = [];
  for (let i = 1; i <= playerCount; i++) {
    const nameEl = document.getElementById(`pname-${i}`);
    if (!nameEl) continue;
    const name = nameEl.value.trim();
    if (!name) continue;
    const teams = [1,2,3,4,5,6].map(j => {
      const el = document.getElementById(`pt${j}-${i}`);
      return el ? el.value : '';
    }).filter(Boolean);
    if (teams.length > 0) players.push({ name, teams });
  }
  if (players.length < 2) { alert('Please add at least 2 players with teams.'); return; }
  document.getElementById('setupOverlay').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  saveState();
  fetchAndUpdate();
}

function showSetup() {
  document.getElementById('setupOverlay').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('playerInputs').innerHTML = '';
  playerCount = 0;
  players.forEach(p => addPlayerInput(p.name, [...p.teams,'','','','','',''].slice(0,6)));
  if (players.length === 0) { addPlayerInput(); addPlayerInput(); }
}

// ─── SHARE COMPRESSION TOOL ──────────────────────────────────────────────────
function generateShareLink() {
  try {
    const jsonString = JSON.stringify(players);
    const encodedData = btoa(encodeURIComponent(jsonString));
    const shareUrl = `${window.location.origin}${window.location.pathname}?draft=${encodedData}`;
    
    navigator.clipboard.writeText(shareUrl).then(() => {
      alert("✨ Shareable link copied to clipboard! Pin this URL to your group chat or bookmark it.");
    }).catch(() => {
      alert(`Copy this URL:\n\n${shareUrl}`);
    });
  } catch (e) {
    alert("Could not generate link.");
  }
}

function injectShareButton() {
  if (document.getElementById('shareBtn')) return;
  const actionsContainer = document.querySelector('.header-actions');
  if (actionsContainer) {
    const shareBtn = document.createElement('button');
    shareBtn.id = 'shareBtn';
    shareBtn.className = 'edit-btn';
    shareBtn.style.borderColor = 'var(--green)';
    shareBtn.style.color = 'var(--green)';
    shareBtn.innerHTML = '🔗 Share Board';
    shareBtn.onclick = generateShareLink;
    actionsContainer.insertBefore(shareBtn, actionsContainer.firstChild);
  }
}

// ─── CACHE STORAGE ENGINE ─────────────────────────────────────────────────────
function saveState() {
  try { localStorage.setItem('wc26_players', JSON.stringify(players)); } catch(e){}
}

function loadState() {
  const urlParams = new URLSearchParams(window.location.search);
  const draftParam = urlParams.get('draft');
  if (draftParam) {
    try {
      const decodedData = decodeURIComponent(atob(draftParam));
      const parsed = JSON.parse(decodedData);
      if (Array.isArray(parsed) && parsed.length > 0) {
        players = parsed;
        saveState();
        return true;
      }
    } catch(e) { console.error(e); }
  }
  try {
    const saved = localStorage.getItem('wc26_players');
    if (saved) { players = JSON.parse(saved); return true; }
  } catch(e){}
  return false;
}

async function fetchAndUpdate() {
  setStatus('loading', 'Updating leaderboard matrix from tournament records...');
  const btn = document.getElementById('refreshBtn');
  const icon = document.getElementById('refreshIcon');
  if(btn) btn.disabled = true;
  if(icon) icon.classList.add('spin');

  try {
    throw new Error("Local engine fallback active");
  } catch(e) {
    useLocalMirrorFallback();
  }

  if(btn) btn.disabled = false;
  if(icon) icon.classList.remove('spin');
}

function processDataAndUIRender(mode) {
  buildScoredPlayers();
  renderAll();
  injectShareButton();
  const ftCount = (gameData.matches||[]).filter(m=>m.status==='FT'||m.status==='AET').length;
  const liveCount = (gameData.matches||[]).filter(m=>m.status==='LIVE').length;
  setStatus('ok', `Live Sync Complete • ${ftCount} Results Processed`);
  document.getElementById('headerSub').textContent = `${ftCount} results · ${liveCount} live`;
}

function norm(s) { return (s||'').toLowerCase().trim(); }

function calcTeamScore(teamName, matches, qualified, eliminated, goldenBoot, goalOfTournament, youngPlayer) {
  const tn = norm(teamName);
  let score = 0;
  const matchDetails = [];

  for (const m of (matches||[])) {
    if (m.status === 'upcoming' || m.homeScore === null || m.awayScore === null) continue;
    const isHome = norm(m.homeTeam) === tn;
    const isAway = norm(m.awayTeam) === tn;
    if (!isHome && !isAway) continue;

    const myScore = isHome ? m.homeScore : m.awayScore;
    const oppScore = isHome ? m.awayScore : m.homeScore;
    const oppTeam = isHome ? m.awayTeam : m.homeTeam;
    const margin = myScore - oppScore;
    let matchPts = 0;
    const matchEvents = [];
    const outcome = margin > 0 ? 'win' : margin < 0 ? 'loss' : 'draw';

    if (m.aeT || m.status === 'AET') {
      if (margin > 0) { matchPts += 2; matchEvents.push('Win AET +2'); }
      else if (margin === 0) { matchPts += 1; matchEvents.push('Draw +1'); }
    } else if (m.status === 'PEN') {
      if (margin >= 0) { matchPts += 2; matchEvents.push('Win (pens) +2'); }
    } else {
      if (margin > 0) { matchPts += 3; matchEvents.push(`Win +3`); }
      else if (margin === 0) { matchPts += 1; matchEvents.push('Draw +1'); }
    }

    if (margin >= 3) { matchPts += 1; matchEvents.push('3+ goal margin +1'); }
    if (oppScore === 0) {
      if (outcome !== 'loss') { matchPts += 0.5; matchEvents.push('Clean sheet +0.5'); }
    }

    const rc = (m.redCards?.[isHome ? 'homeTeam' : 'awayTeam']) || 0;
    if (rc > 0) { matchPts -= rc; matchEvents.push(`Red card ×${rc} -${rc}`); }

    score += matchPts;
    matchDetails.push({ match: m, oppTeam, myScore, oppScore, outcome, pts: matchPts, events: matchEvents });
  }

  const bonuses = [];
  if ((qualified||[]).some(q => norm(q) === tn)) { score += 0.5; bonuses.push('Qualified +0.5'); }
  return { score, matchDetails, bonuses };
}

function buildScoredPlayers() {
  const { matches=[], qualified=[], eliminated=[], goldenBoot, goalOfTournament, youngPlayer } = gameData;
  scoredPlayers = players.map(p => {
    let total = 0;
    const teamBreakdown = p.teams.map(t => {
      const { score, matchDetails, bonuses } = calcTeamScore(t, matches, qualified, eliminated, goldenBoot, goalOfTournament, youngPlayer);
      total += score;
      const isElim = eliminated.some(e => norm(e) === norm(t));
      const isQual = qualified.some(q => norm(q) === norm(t));
      return { team: t, score, matchDetails, bonuses, isElim, isQual };
    });
    return { ...p, total, teamBreakdown };
  }).sort((a,b) => b.total - a.total);
}

function renderAll() {
  renderLeaderboard();
  renderUpcoming();
  renderH2H();
  renderGoldenBoot();
}

function renderLeaderboard() {
  const lb = document.getElementById('leaderboardContent');
  if(!lb) return;
  
  lb.innerHTML = scoredPlayers.map((p, i) => {
    const rankClass = i===0?'gold':i===1?'silver':i===2?'bronze':'other';
    const rankSymbol = i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`;
    
    const chips = p.teamBreakdown.map((t,ti) => {
      const cls = t.isElim ? 'eliminated' : t.isQual ? 'alive' : '';
      const icon = t.isElim ? '❌' : t.isQual ? '✅' : '⏳';
      const pts = t.score % 1 === 0 ? t.score : t.score.toFixed(1);
      return `<span class="chip ${cls}" onclick="openTeamTab(event,${i},${ti})">${icon} ${t.team} <strong style="color:var(--accent)">${pts>0?'+':''}${pts}</strong></span>`;
    }).join('');

    const teamTabs = p.teamBreakdown.map((t,ti) =>
      `<div class="team-tab ${ti===0?'active':''}" id="ttab-${i}-${ti}" onclick="switchTeamTab(${i},${ti})">${t.team}</div>`
    ).join('');

    const teamPanels = p.teamBreakdown.map((t,ti) => {
      const matchRows = t.matchDetails.map(d => {
        const s = `${d.myScore}–${d.oppScore}`;
        const ptsStr = d.pts > 0 ? `+${d.pts}` : d.pts < 0 ? `${d.pts}` : '0';
        const badge = d.match.status==='LIVE' ? '<span class="badge-live">LIVE</span>' : '<span class="badge-ft">FT</span>';
        return `
          <div class="match-result-row ${d.outcome}" style="margin-bottom:6px">
            <div class="mrr-top">
              <span>vs ${d.oppTeam} ${badge}</span>
              <span class="mrr-score">${s}</span>
            </div>
            <div class="mrr-pts">Points gained: <strong>${ptsStr}</strong> (${d.events.join(', ')})</div>
          </div>`;
      }).join('');

      const bonusRows = t.bonuses.map(b => `<div class="detail-row"><span class="dr-label">Bonus Achievement</span><span class="dr-val pos">${b}</span></div>`).join('');
      
      return `
        <div class="team-detail" id="tpanel-${i}-${ti}" style="display:${ti===0?'block':'none'}">
          <div class="team-detail-header">
            <span class="team-detail-name">⚽ ${t.team} Overview</span>
            <span class="team-detail-score">${t.score.toFixed(1)} pts</span>
          </div>
          <div class="detail-rows">
            ${matchRows || '<div style="color:var(--muted);font-size:0.8rem;padding:4px">No matches processed yet.</div>'}
            ${bonusRows}
          </div>
        </div>`;
    }).join('');

    return `
      <div class="player-card">
        <div class="card-header" onclick="toggleCard(${i})">
          <div class="rank ${rankClass}">${rankSymbol}</div>
          <div class="player-info">
            <div class="player-name">${p.name}</div>
            <div class="team-chips">${chips}</div>
          </div>
          <div class="score-display">
            <div class="score-big">${p.total.toFixed(1)}</div>
            <div class="score-label">PTS</div>
            <div class="expand-hint" id="ehint-${i}">▼ Expand Details</div>
          </div>
        </div>
        <div class="card-breakdown" id="breakdown-${i}">
          <div class="team-tabs">${teamTabs}</div>
          ${teamPanels}
        </div>
      </div>`;
  }).join('');
}

function toggleCard(idx) {
  const el = document.getElementById(`breakdown-${idx}`);
  const hint = document.getElementById(`ehint-${idx}`);
  if (!el) return;
  const isOpen = el.classList.contains('open');
  el.classList.toggle('open', !isOpen);
  if (hint) hint.textContent = isOpen ? '▼ Expand Details' : '▲ Collapse Details';
}

function openTeamTab(event, pIdx, tIdx) {
  event.stopPropagation();
  const el = document.getElementById(`breakdown-${pIdx}`);
  const hint = document.getElementById(`ehint-${pIdx}`);
  if (el && !el.classList.contains('open')) {
    el.classList.add('open');
    if (hint) hint.textContent = '▲ Collapse Details';
  }
  switchTeamTab(pIdx, tIdx);
}

function switchTeamTab(pIdx, tIdx) {
  const card = document.getElementById(`breakdown-${pIdx}`);
  if (!card) return;
  card.querySelectorAll('.team-tab').forEach((el, i) => el.classList.toggle('active', i === tIdx));
  card.querySelectorAll('.team-detail').forEach((el, i) => el.style.display = i === tIdx ? 'block' : 'none');
}

function renderUpcoming() {
  const liveSec = document.getElementById('liveFixturesSection');
  const liveCont = document.getElementById('liveFixtures');
  const upCont = document.getElementById('upcomingContent');
  
  const liveMatches = (gameData.matches || []).filter(m => m.status === 'LIVE');
  const upMatches = (gameData.matches || []).filter(m => m.status === 'upcoming');

  const getOwnersStr = (teamH, teamA) => {
    const list = [];
    players.forEach(p => {
      if (p.teams.some(t => norm(t) === norm(teamH) || norm(t) === norm(teamA))) {
        list.push(p.name);
      }
    });
    return list.length > 0 ? `👤 Drafted by: ${list.join(', ')}` : 'Not drafted in league';
  };

  if (liveMatches.length > 0 && liveCont && liveSec) {
    liveSec.style.display = 'block';
    liveCont.innerHTML = liveMatches.map(m => `
      <div class="live-fixture">
        <div class="fixture-top">
          <span class="fixture-teams">📣 ${m.homeTeam} vs ${m.awayTeam}</span>
          <span class="fixture-score">${m.homeScore} – ${m.awayScore}</span>
        </div>
        <div class="fixture-owners"><span class="owner-tag highlighted">${getOwnersStr(m.homeTeam, m.awayTeam)}</span></div>
      </div>`).join('');
  } else if (liveSec) {
    liveSec.style.display = 'none';
  }

  if (upCont) {
    if (upMatches.length === 0) {
      upCont.innerHTML = '<div class="empty-state">No upcoming matches scheduled.</div>';
      return;
    }
    
    // Group fixtures by formatted date
    const groups = {};
    upMatches.forEach(m => {
      const d = new Date(m.date);
      const dateStr = isNaN(d.getTime()) ? 'Schedule Pending' : d.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
      if (!groups[dateStr]) groups[dateStr] = [];
      groups[dateStr].push(m);
    });

    upCont.innerHTML = Object.keys(groups).map(dateStr => `
      <div class="date-group-title">${dateStr}</div>
      ${groups[dateStr].map(m => {
        const tStr = new Date(m.date).toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
        return `
          <div class="fixture-card">
            <div class="fixture-top">
              <span class="fixture-teams">${m.homeTeam} vs ${m.awayTeam}</span>
              <span style="font-size:0.75rem;color:var(--muted)">${tStr} (${m.stage})</span>
            </div>
            <div class="fixture-owners"><span class="owner-tag">${getOwnersStr(m.homeTeam, m.awayTeam)}</span></div>
          </div>`;
      }).join('')}
    `).join('');
  }
}

function renderH2H() {
  const h2h = document.getElementById('h2hContent');
  if (!h2h) return;
  if (scoredPlayers.length === 0) {
    h2h.innerHTML = '<div class="empty-state">Standings array incomplete.</div>';
    return;
  }

  let html = `<table><thead><tr><th>Draft League Matrix</th>`;
  scoredPlayers.forEach(p => html += `<th>${p.name}</th>`);
  html += `</tr></thead><tbody>`;

  scoredPlayers.forEach((pRow, i) => {
    html += `<tr><td class="row-label">${pRow.name}</td>`;
    scoredPlayers.forEach((pCol, j) => {
      if (i === j) {
        html += `<td class="diagonal">/</td>`;
      } else {
        const diff = pRow.total - pCol.total;
        if (diff > 0) html += `<td class="win-cell">+${diff.toFixed(1)}</td>`;
        else if (diff < 0) html += `<td class="loss-cell">${diff.toFixed(1)}</td>`;
        else html += `<td class="draw-cell">Tie</td>`;
      }
    });
    html += `</tr>`;
  });

  html += `</tbody></table>`;
  h2h.innerHTML = html;
}

function renderGoldenBoot() {
  const dest = document.getElementById('bootContent');
  if (!dest) return;
  const scorers = gameData.goldenBootScorers || [];
  if (scorers.length === 0) {
    dest.innerHTML = '<div class="empty-state">No tournament goal data loaded yet.</div>';
    return;
  }

  dest.innerHTML = scorers.map((s, i) => {
    const rankDisplay = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i + 1}`;
    const rankColor = i === 0 ? 'var(--gold)' : i === 1 ? 'var(--silver)' : i === 2 ? 'var(--bronze)' : 'var(--muted)';
    
    const owners = [];
    players.forEach(p => {
      if (p.teams.some(t => norm(t) === norm(s.team))) owners.push(p.name);
    });

    return `
      <div class="boot-card">
        <div class="boot-rank" style="color:${rankColor}">${rankDisplay}</div>
        <div class="boot-info">
          <div class="boot-player">${s.player}</div>
          <div class="boot-team">🏳️ ${s.team}</div>
          ${owners.length > 0
            ? `<div class="boot-fantasy">Aided: <strong style="color:var(--accent)">${owners.join(', ')}</strong></div>`
            : `<div class="boot-fantasy" style="color:var(--muted)">Unowned team</div>`}
        </div>
        <div class="boot-goals">${s.goals}<span>goals</span></div>
      </div>`;
  }).join('');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  if (loadState() && players.length >= 2) {
    players.forEach(p => addPlayerInput(p.name, [...p.teams,'','','','','',''].slice(0,6)));
    document.getElementById('setupOverlay').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  } else {
    showSetup();
  }
});
</script>
</body>
</html>
